<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c62a42;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background: Rounded Square -->
  <rect width="512" height="512" rx="120" fill="url(#grad)" />
  
  <!-- Inner Circle: Gold -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffd700" stroke-width="15" opacity="0.8" />
  
  <!-- Character: 漢 (Simple Path Representation for consistent look) -->
  <!-- Using text for simplicity, assuming system font fallback works, or simple paths -->
  <text x="50%" y="50%" dy=".35em" text-anchor="middle" font-family="serif" font-weight="bold" font-size="320" fill="#ffffff" filter="url(#shadow)">漢</text>
  
  <!-- Small Brush Decoration -->
  <path d="M 380 380 Q 420 420 450 400" stroke="#ffd700" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>